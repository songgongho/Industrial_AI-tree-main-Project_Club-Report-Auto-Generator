<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헬스동호회 보고서 자동생성기</title>
    <style>
        :root {
            --color-primary: #2b5c8f;
            --color-bg: #f4f7f6;
            --color-surface: #ffffff;
            --color-border: #dce1e5;
            --color-text: #333333;
            --color-text-secondary: #666666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: var(--color-surface);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 { color: var(--color-primary); margin-bottom: 5px; }

        .section-card {
            background: var(--color-surface);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .section-card h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 10px;
            display: inline-block;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        .hint { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 5px; }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            font-family: monospace;
            resize: vertical;
            white-space: pre;
        }

        input[type="text"], input[type="number"], input[type="month"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary { background: var(--color-primary); color: white; }
        .btn-primary:hover { background: #1f446b; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-success { background: #28a745; color: white; width: 100%; font-size: 16px; padding: 15px; }

        .transfer-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .transfer-table th, .transfer-table td {
            border: 1px solid var(--color-border);
            padding: 8px;
            text-align: center;
        }
        .transfer-table th { background: #f8f9fa; }
        .transfer-table input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .transfer-table input[type="number"] { width: 90%; padding: 5px; }

        /* Report Styles */
        .report-output {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
        }
        .report-output.active { display: block; }

        .report-content {
            max-width: 210mm; /* A4 Width for screen view */
            margin: 0 auto;
            position: relative;
        }

        .report-title {
            text-align: left;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .signature-table {
            width: 240px;
            border-collapse: collapse;
            table-layout: fixed; /* 모든 셀의 크기를 균등하게 고정 */
        }
        .signature-table td {
            border: 1px solid #000;
            padding: 5px;
            text-align: center;
            font-size: 13px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .data-table th, .data-table td {
            border: 1px solid #000;
            padding: 6px;
            vertical-align: middle;
        }
        .data-table th { background: #f8f9fa; font-weight: bold; text-align: center; }
        .text-right { text-align: right !important; }
        .text-center { text-align: center !important; }
        .total-row { font-weight: bold; background: #f8f9fa; }

        .section-title { font-weight: bold; margin: 25px 0 10px 0; font-size: 15px;}
        
        .receipt-table td { vertical-align: top; text-align: center; padding: 10px; width: 50%;}

        /* Image Attachment Zones */
        .image-zone {
            width: 100%;
            border: 2px dashed #b0b8c1;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: 0.2s;
            text-align: center;
            font-size: 13px;
            flex-direction: column;
        }
        .image-zone:hover {
            border-color: var(--color-primary);
            background: #eef2f5;
            color: var(--color-primary);
        }
        .image-zone:focus { outline: 2px solid var(--color-primary); }
        .image-zone img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            display: none;
        }
        .image-zone.has-file {
            border: 1px solid #dce1e5;
            background: transparent;
        }
        .image-zone.has-file span { display: none; }
        .image-zone.has-file img { display: block; }
        
        /* 4개 1:1 사진 그리드 */
        .activity-photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .activity-photo-zone { 
            aspect-ratio: 1 / 1; 
            height: auto; 
            padding: 5px;
        }
        
        .receipt-zone { height: 280px; margin-top: 5px; }

        /* A4 Page Formatting for Application Form */
        .application-form-page {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 250mm;
            padding-top: 10mm;
        }

        /* 프린트 전용 최적화 CSS */
        @media print {
            @page {
                size: A4;
                margin: 10mm 15mm;
            }
            body { 
                background: white; 
                padding: 0; 
                -webkit-print-color-adjust: exact; /* 헤더 배경색 인쇄 강제 */
                print-color-adjust: exact;
            }
            .section-card, .header, .print-hide { display: none !important; }
            .report-output { box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
            .report-content { max-width: 100%; margin: 0; }
            
            /* 중간 잘림 방지 (페이지 브레이크 제어) */
            table { page-break-inside: auto; break-inside: auto; }
            tr { page-break-inside: avoid; break-inside: avoid; page-break-after: auto; }
            .image-zone { page-break-inside: avoid; break-inside: avoid; }
            .section-title { page-break-after: avoid; break-after: avoid; }
            .activity-photo-grid { page-break-inside: avoid; break-inside: avoid; }
            
            /* 빈 첨부 영역 인쇄 텍스트 숨김 처리 및 테두리 제거 */
            .image-zone:not(.has-file) span { display: none; }
            .image-zone:not(.has-file) { border-color: transparent !important; background: transparent; }
            
            .page-break { page-break-before: always; }
            
            /* 지원금 신청서 단일 페이지 보장 */
            .application-form-page {
                page-break-inside: avoid;
                break-inside: avoid;
                min-height: 250mm;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏋️ 헬스동호회 정산 및 보고서 생성기</h1>
    </div>

    <div class="section-card" id="step1Section">
        <h2>1단계: 데이터 입력</h2>
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>활동 월</label>
                <input type="month" id="reportMonth" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>동호회 총원</label>
                <input type="number" id="totalMembers" value="11">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>대표자 성명</label>
                <input type="text" id="representative" value="송공호">
            </div>
        </div>

        <div class="form-group">
            <label>지원금 수령 계좌</label>
            <input type="text" id="accountInfo" value="7979-734-9714/카카오뱅크/송공호">
        </div>

        <div class="form-group">
            <label>네이버폼 엑셀 전체 데이터 (복사/붙여넣기)</label>
            <div class="hint">엑셀 헤더 행을 제외한 데이터 영역만 복사해서 붙여넣어주세요</div>
            <textarea id="excelData" placeholder="응답일시   참여자   성함..."></textarea>
        </div>

        <button type="button" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;" onclick="processStep1()">데이터 분석 및 공동구매 자동 설정</button>
    </div>

    <div class="section-card" id="step2Section" style="display: none;">
        <h2>2단계: 공동구매(지원금 이동) 설정</h2>
        <p class="hint">※ 보조비 30,000원을 채우기 위해 부족한 분들에게 1,000원 단위 올림으로 금액이 자동 배분되었습니다. 필요 시 체크박스 및 금액을 수정하세요</p>
        
        <div id="transferContainer"></div>

        <button type="button" class="btn btn-success" onclick="processStep2()">최종 보고서 렌더링</button>
    </div>

    <div class="report-output" id="reportOutput">
        <div style="text-align: right; margin-bottom: 20px;" class="print-hide">
            <span style="color:var(--color-primary); font-weight:bold; margin-right:15px; font-size:14px;">💡 팁: 첨부 영역을 클릭하여 이미지 파일을 선택하거나 Ctrl+V로 붙여넣으세요</span>
            <button type="button" class="btn btn-secondary" onclick="printReport()">🖨️ 인쇄 / PDF 저장</button>
        </div>
        <div class="report-content" id="reportContent"></div>
    </div>
</div>

<script>
    let globalPeople = [];
    let globalTransfers = [];
    let reportMonthStart = '';
    let reportMonthEnd = '';
    let reportMonthNum = '';

    const formatNumber = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    
    function numberToKorean(num) {
        const units = ['', '만', '억'];
        const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
        const positions = ['', '십', '백', '천'];
        if (num === 0) return '영';
        let result = '';
        let unitIndex = 0;
        while (num > 0) {
            const part = num % 10000;
            if (part > 0) {
                let partStr = '';
                let tempPart = part;
                let posIndex = 0;
                while (tempPart > 0) {
                    const digit = tempPart % 10;
                    if (digit > 0) {
                        if (digit === 1 && posIndex > 0) {
                            partStr = positions[posIndex] + partStr;
                        } else {
                            partStr = digits[digit] + positions[posIndex] + partStr;
                        }
                    }
                    tempPart = Math.floor(tempPart / 10);
                    posIndex++;
                }
                result = partStr + units[unitIndex] + result;
            }
            num = Math.floor(num / 10000);
            unitIndex++;
        }
        return result;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function processStep1() {
        const excelText = document.getElementById('excelData').value.trim();
        const monthVal = document.getElementById('reportMonth').value;

        if(!excelText || !monthVal) {
            alert("활동 월과 엑셀 데이터를 모두 입력해주세요");
            return;
        }

        const [yyyy, mm] = monthVal.split('-');
        reportMonthNum = parseInt(mm, 10);
        const lastDay = new Date(yyyy, mm, 0).getDate();
        reportMonthStart = `${reportMonthNum}/1`;
        reportMonthEnd = `${reportMonthNum}/${lastDay}`;

        const lines = excelText.split('\n');
        const map = new Map();

        lines.forEach(line => {
            if(!line.trim()) return;
            const cells = line.split('\t').map(c => c.trim());
            const name = cells[2] || '';
            if(!name) return;

            const purchaseDate = cells[4] || '';
            const itemType = cells[5] || '';
            const itemPrice = parseFloat(cells[6]) || 0;
            const gymRegDate = cells[7] || '';
            const gymAmountStr = cells[8] || '';
            const gymFee = gymAmountStr === '장기' ? 0 : (parseFloat(gymAmountStr) || 0);

            if(!map.has(name)) {
                map.set(name, {
                    name,
                    itemTypes: itemType ? [itemType] : [],
                    itemPrice: itemPrice,
                    purchaseDates: purchaseDate ? [purchaseDate] : [],
                    gymAmountStr: gymAmountStr,
                    gymFee: gymFee
                });
            } else {
                let p = map.get(name);
                p.itemPrice += itemPrice;
                if(itemType) p.itemTypes.push(itemType);
                if(purchaseDate) p.purchaseDates.push(purchaseDate);
                if(gymFee > 0) p.gymFee += gymFee;
                if(gymAmountStr === '장기') p.gymAmountStr = '장기';
            }
        });

        globalPeople = Array.from(map.values());

        globalTransfers = [];
        let donors = globalPeople.filter(p => (p.itemPrice + p.gymFee) > 30000 && p.itemPrice > 0)
                                 .map(p => ({ ...p, available: (p.itemPrice + p.gymFee) - 30000 }));
        
        let lackers = globalPeople.filter(p => (p.itemPrice + p.gymFee) < 30000);

        lackers.forEach(l => {
            let total = l.itemPrice + l.gymFee;
            let shortage = 30000 - total;
            let target = Math.ceil(shortage / 1000) * 1000; 

            for(let d of donors) {
                if(target <= 0) break;
                if(d.available <= 0) continue;
                
                let amount = Math.min(target, d.available);
                globalTransfers.push({
                    id: Date.now() + Math.random(),
                    active: true,
                    from: d.name,
                    to: l.name,
                    amount: amount,
                    itemName: d.itemTypes[0] || '물품'
                });
                d.available -= amount;
                target -= amount;
            }
        });

        renderTransferUI();
        document.getElementById('step2Section').style.display = 'block';
        document.getElementById('step2Section').scrollIntoView({behavior: 'smooth'});
    }

    function renderTransferUI() {
        const container = document.getElementById('transferContainer');
        let html = '<table class="transfer-table">';
        html += '<tr><th>적용</th><th>구매자 (제공)</th><th>수령자 (보조비 부족자)</th><th>이동 대상 물품</th><th>이동 금액(원)</th></tr>';

        globalTransfers.forEach((t, i) => {
            let fromOpts = globalPeople.map(p => `<option value="${p.name}" ${p.name===t.from?'selected':''}>${p.name}</option>`).join('');
            let toOpts = globalPeople.map(p => `<option value="${p.name}" ${p.name===t.to?'selected':''}>${p.name}</option>`).join('');

            html += `<tr>
                <td><input type="checkbox" id="tr_active_${i}" ${t.active ? 'checked' : ''}></td>
                <td><select id="tr_from_${i}">${fromOpts}</select></td>
                <td><select id="tr_to_${i}">${toOpts}</select></td>
                <td><input type="text" id="tr_item_${i}" value="${t.itemName}"></td>
                <td><input type="number" id="tr_amount_${i}" value="${t.amount}" step="1000"></td>
            </tr>`;
        });
        html += '</table>';
        html += `<button type="button" class="btn btn-secondary" onclick="addManualTransfer()">+ 이동 내역 추가</button>`;
        container.innerHTML = html;
    }

    function addManualTransfer() {
        if(globalPeople.length === 0) return;
        globalTransfers.push({
            active: true,
            from: globalPeople[0].name,
            to: globalPeople[globalPeople.length > 1 ? 1 : 0].name,
            itemName: '물품',
            amount: 10000
        });
        renderTransferUI();
    }

    function processStep2() {
        const appliedTransfers = [];
        globalTransfers.forEach((t, i) => {
            const active = document.getElementById(`tr_active_${i}`).checked;
            if(active) {
                appliedTransfers.push({
                    from: document.getElementById(`tr_from_${i}`).value,
                    to: document.getElementById(`tr_to_${i}`).value,
                    itemName: document.getElementById(`tr_item_${i}`).value,
                    amount: parseFloat(document.getElementById(`tr_amount_${i}`).value) || 0
                });
            }
        });

        const finalData = globalPeople.map(p => ({
            ...p,
            finalItemPrice: p.itemPrice,
            received: [],
            given: []
        }));

        appliedTransfers.forEach(t => {
            const donor = finalData.find(p => p.name === t.from);
            const lacker = finalData.find(p => p.name === t.to);
            if(donor && lacker && t.amount > 0) {
                donor.finalItemPrice -= t.amount;
                donor.given.push(t);
                lacker.received.push(t);
            }
        });

        let totalSupport = 0;
        let totalSelf = 0;
        let totalGymFee = 0;
        let monthlyUsers = [];
        let longTermUsers = [];

        finalData.forEach(p => {
            let costForMe = p.finalItemPrice + p.gymFee;
            p.received.forEach(r => costForMe += r.amount);

            if(costForMe >= 30000) {
                p.finalSupport = 30000;
                p.finalSelf = costForMe - 30000;
            } else {
                p.finalSupport = costForMe;
                p.finalSelf = 0;
            }
            
            totalSupport += p.finalSupport;
            totalSelf += p.finalSelf;
            totalGymFee += p.gymFee;

            if(p.gymFee > 0) monthlyUsers.push(p.name);
            if(p.gymAmountStr === '장기') longTermUsers.push(p.name);
        });

        const totalAmount = totalSupport + totalSelf;

        let executionRows = '';
        let gymRegText = '';
        if (monthlyUsers.length > 0) gymRegText += `매월결제: ${monthlyUsers.join(', ')} 헬스장 등록 (${monthlyUsers.length}명)<br>`;
        if (longTermUsers.length > 0) gymRegText += `정기결제: ${longTermUsers.join(', ')} 장기 (${longTermUsers.length}명)`;

        if(gymRegText) {
            executionRows += `<tr>
                <td class="text-center">${reportMonthStart} ~ ${reportMonthEnd}</td>
                <td>${gymRegText}</td>
                <td class="text-right">${formatNumber(totalGymFee)}</td>
            </tr>`;
        }

        const receiptItems = [];
        finalData.filter(p => p.itemPrice > 0).forEach(p => {
            let namesArr = [p.name];
            p.given.forEach(t => { if(!namesArr.includes(t.to)) namesArr.push(t.to); });
            
            let itemStr = p.itemTypes.join(', ');
            let fullText = `${namesArr.join(', ')} ${itemStr} ${formatNumber(p.itemPrice)}원`;
            let displayDate = formatDate(p.purchaseDates[0]) || `${reportMonthStart}`;
            
            executionRows += `<tr>
                <td class="text-center">${displayDate}</td>
                <td>${fullText}</td>
                <td class="text-right">${formatNumber(p.itemPrice)}</td>
            </tr>`;

            receiptItems.push(fullText);
        });

        let settlementRows = '';
        finalData.forEach(p => {
            let itemsText = [];
            if(p.finalItemPrice > 0) itemsText.push(`${p.itemTypes[0] || '물품'} ${formatNumber(p.finalItemPrice)}원`);
            
            p.received.forEach(r => { itemsText.push(`${r.itemName} ${formatNumber(r.amount)}원`); });

            if(p.gymFee > 0) itemsText.push(`헬스장 ${formatNumber(p.gymFee)}원`);
            else if(p.gymAmountStr === '장기') itemsText.push(`헬스장 장기`);

            settlementRows += `<tr>
                <td class="text-center">${p.name}</td>
                <td class="text-right">${formatNumber(p.finalSupport)}</td>
                <td class="text-right">${formatNumber(p.finalSelf)}</td>
                <td>${itemsText.join(' ')}</td>
            </tr>`;
        });

        let receiptRows = '';
        let allReceiptsText = [];
        if(monthlyUsers.length > 0) allReceiptsText.push(`${monthlyUsers.join(', ')} 헬스장 등록 ${formatNumber(totalGymFee)}원`);
        allReceiptsText.push(...receiptItems);

        for(let i=0; i<allReceiptsText.length; i+=2) {
            let text1 = allReceiptsText[i];
            let text2 = allReceiptsText[i+1];

            receiptRows += `<tr>
                <td>
                    <div style="font-weight:bold; margin-bottom:5px;">${text1}</div>
                    <div class="image-zone receipt-zone" tabindex="0">
                        <span>클릭하여 영수증 선택<br>(이미지)</span>
                        <img src="" />
                    </div>
                </td>
                <td>
                    ${text2 ? `
                        <div style="font-weight:bold; margin-bottom:5px;">${text2}</div>
                        <div class="image-zone receipt-zone" tabindex="0">
                            <span>클릭하여 영수증 선택<br>(이미지)</span>
                            <img src="" />
                        </div>
                    ` : ''}
                </td>
            </tr>`;
        }

        const participantCount = finalData.length;
        const totalMembers = document.getElementById('totalMembers').value;
        const representative = document.getElementById('representative').value;
        const accountInfo = document.getElementById('accountInfo').value;
        const koreanTotalSupport = numberToKorean(Math.round(totalSupport/10000));
        const today = new Date();
        const todayStr = `${today.getFullYear()}년 ${String(today.getMonth()+1).padStart(2,'0')}월 ${String(today.getDate()).padStart(2,'0')}일`;

        const reportHTML = `
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                <div class="report-title" style="margin-bottom: 0; padding-top: 10px;">동호회활동 결과보고서</div>

        attachImageEvents();
    }

    function printReport() {
        window.print();
    }

    function attachImageEvents() {
        let fileInput = document.getElementById('globalFileInput');
        if (!fileInput) {
            fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.id = 'globalFileInput';
            fileInput.accept = 'image/*';
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);
        }

        let currentActiveZone = null;

        fileInput.onchange = function(e) {
            if (e.target.files.length > 0 && currentActiveZone) {
                handleFileDisplay(currentActiveZone, e.target.files[0]);
            }
            fileInput.value = ''; 
        };

        document.querySelectorAll('.image-zone').forEach(zone => {
            zone.addEventListener('click', function() {
                currentActiveZone = zone;
                fileInput.click();
            });
        });

        document.addEventListener('paste', function(e) {
            const target = document.activeElement.closest('.image-zone');
            if (!target) return;

            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    handleFileDisplay(target, blob);
                    e.preventDefault();
                    return;
                }
            }
        });
    }

    function handleFileDisplay(zone, file) {
        const url = URL.createObjectURL(file);
        const img = zone.querySelector('img');
        img.src = url;
        img.style.display = 'block';
        zone.classList.add('has-file');
    }

    window.onload = () => {
        const now = new Date();
        document.getElementById('reportMonth').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    };
</script>
